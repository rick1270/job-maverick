<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; font-size: 13px; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message { display: flex; flex-direction: column; gap: 3px; }
    .label { font-size: 11px; color: #888; font-weight: bold; }

    .user-bubble {
      background: #e8f0fe;
      border-radius: 8px;
      padding: 8px 10px;
      color: #1a1a1a;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .assistant-bubble {
      background: #f1f3f4;
      border-radius: 8px;
      padding: 8px 10px;
      color: #1a1a1a;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .error-bubble {
      background: #fce8e6;
      border-radius: 8px;
      padding: 8px 10px;
      color: #c62828;
      white-space: pre-wrap;
    }

    #input-area {
      padding: 10px;
      border-top: 1px solid #dadce0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #question {
      width: 100%;
      padding: 8px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      resize: vertical;
      min-height: 64px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      line-height: 1.4;
    }
    #question:focus { outline: none; border-color: #1a73e8; }

    #send {
      padding: 8px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }
    #send:hover { background: #1557b0; }
    #send:disabled { background: #aaa; cursor: default; }

    #footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #hint { font-size: 11px; color: #aaa; }
    #clear-btn {
      font-size: 11px;
      color: #888;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }
    #clear-btn:hover { color: #333; }
  </style>
</head>
<body>
  <div id="chat"></div>
  <div id="input-area">
    <textarea id="question" placeholder="Ask Claude anything about your job search…"></textarea>
    <button id="send" onclick="sendQuestion()">Ask Claude</button>
    <div id="footer">
      <span id="hint">Ctrl+Enter to send</span>
      <button id="clear-btn" onclick="clearChat()">Clear chat</button>
    </div>
  </div>

  <script>
    var conversationHistory = [];

    document.getElementById('question').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        sendQuestion();
      }
    });

    function sendQuestion() {
      var q = document.getElementById('question').value.trim();
      if (!q) return;

      addMessage('You', q, 'user-bubble');
      document.getElementById('question').value = '';
      document.getElementById('send').disabled = true;
      document.getElementById('send').textContent = 'Thinking…';

      conversationHistory.push({ role: 'user', content: q });

      google.script.run
        .withSuccessHandler(function(response) {
          conversationHistory.push({ role: 'assistant', content: response });
          addMessage('Claude', response, 'assistant-bubble');
          document.getElementById('send').disabled = false;
          document.getElementById('send').textContent = 'Ask Claude';
          document.getElementById('question').focus();
        })
        .withFailureHandler(function(err) {
          addMessage('Error', err.message || String(err), 'error-bubble');
          document.getElementById('send').disabled = false;
          document.getElementById('send').textContent = 'Ask Claude';
        })
        .askClaudeFromSidebar(conversationHistory);
    }

    function clearChat() {
      conversationHistory = [];
      document.getElementById('chat').innerHTML = '';
    }

    function addMessage(label, text, bubbleClass) {
      var chat = document.getElementById('chat');
      var msg = document.createElement('div');
      msg.className = 'message';
      var labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = label;
      var bubble = document.createElement('div');
      bubble.className = bubbleClass;
      bubble.textContent = text;
      msg.appendChild(labelEl);
      msg.appendChild(bubble);
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }
  </script>
</body>
</html>
