<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial, sans-serif; font-size: 13px; padding: 12px; margin: 0; }
    p { color: #333; }
    .drag-row { text-align: center; margin: 16px 0; }
    #drag-link {
      display: inline-block; background: #1a73e8; color: white; text-decoration: none;
      padding: 10px 18px; border-radius: 4px; font-weight: bold; cursor: grab;
    }
    label { display: block; margin-top: 14px; font-weight: bold; color: #333; }
    textarea {
      width: 100%; box-sizing: border-box; height: 70px; margin-top: 4px; font-size: 11px;
      border: 1px solid #ccc; border-radius: 3px; padding: 6px; resize: vertical;
    }
    .buttons { margin-top: 12px; text-align: right; }
    button { padding: 8px 16px; cursor: pointer; border-radius: 4px; font-size: 13px; }
    #copy-btn { background: #1a73e8; color: white; border: none; }
    #close-btn { background: white; border: 1px solid #ccc; margin-left: 8px; }
    #status { margin-top: 8px; font-size: 12px; color: #188038; text-align: right; }
  </style>
</head>
<body>
  <p><strong>Drag this link to your bookmarks bar</strong> — that's it, no copying needed:</p>
  <div class="drag-row">
    <a id="drag-link" href="#">📌 Capture Job</a>
  </div>

  <p>If dragging doesn't work in your browser, create a new bookmark manually and paste this as its URL:</p>
  <label>Bookmark URL</label>
  <textarea id="code" readonly></textarea>

  <div class="buttons">
    <button id="copy-btn" onclick="copyCode()">Copy</button>
    <button id="close-btn" onclick="google.script.host.close()">Close</button>
  </div>
  <div id="status"></div>

  <script>
    const rawCode = <?!= JSON.stringify(code) ?>;

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('drag-link').href = 'javascript:' + encodeURIComponent(rawCode);
      document.getElementById('code').value = 'javascript:' + rawCode;
    });

    function copyCode() {
      const box = document.getElementById('code');
      box.select();
      document.execCommand('copy');
      document.getElementById('status').textContent = 'Copied.';
      setTimeout(function() { document.getElementById('status').textContent = ''; }, 2000);
    }
  </script>
</body>
</html>
